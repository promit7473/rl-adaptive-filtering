seed: 42
fs: 8000
episode_len: 2000
filter_order: 16
state_window: 16

signal:
  type: multitone
  freqs: [200, 350, 700]
  amps: [1.0, 0.6, 0.4]

noise:
  snr_db_options: [0, 5, 10, 15, 20]

filter:
  algo: nlms
  mu: 0.05
  leakage: 1.0

rl:
  mlp:
    total_timesteps: 600000
    n_envs: 8
    policy: MlpPolicy
    learning_rate: 3.0e-4
    n_steps: 2048
    batch_size: 256
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    hidden_size: 128
    n_seeds: 5
  meta:
    total_timesteps: 1200000
    n_envs: 8
    policy: MlpLstmPolicy
    learning_rate: 3.0e-4
    n_steps: 2048
    batch_size: 256
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    hidden_size: 128
    n_seeds: 5
    shared_lstm: false
    enable_critic_lstm: true

eval:
  seeds: [0, 1, 2, 3, 4]
  snr_db_values: [0, 5, 10, 15, 20]
  signal_kind: multitone

paths:
  results_dir: results
  checkpoints_dir: results/checkpoints
